<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Workflowy to Obsidian</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <h1>Workflowy → Obsidian</h1>

    <section class="section row">
      <label class="label checkbox-label">
        <input id="download-attachments" type="checkbox" checked />
        Download attachments (images/files)
      </label>
    </section>

    <section class="section row">
      <label class="label checkbox-label">
        <input id="use-h2-headings" type="checkbox" checked />
        Use H2 headings for top-level items
      </label>
    </section>

    <div id="status-bar" class="status-bar hidden"></div>

    <div class="actions">
      <button id="export-button" type="button" class="primary" disabled>Export to ZIP</button>
    </div>

    <p class="warning">Keep this popup open until the export finishes — navigating away will cancel it.</p>

    <div id="log-container" class="log-container hidden">
      <pre id="log-output"></pre>
    </div>

    <script src="jszip.min.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
